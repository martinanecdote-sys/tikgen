services:
  - type: web
    name: tikgen
    env: python
    region: frankfurt
    plan: free
    buildCommand: "apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 2 --timeout 300 --bind 0.0.0.0:$PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
